services:
  # WebSocket Server
  - type: web
    name: kanban-ws-server
    env: node
    plan: free
    buildCommand: npm ci
    startCommand: node server/ws-server.js
    envVars:
      - key: USE_REDIS
        value: true
      - key: REDIS_URL
        fromService:
          type: redis
          name: kanban-redis
          property: connectionString
      - key: NEXT_PUBLIC_APP_URL
        fromService:
          type: web
          name: kanban-next-app
          property: url

  # Next.js Frontend
  - type: web
    name: kanban-next-app
    env: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start:next
    envVars:
      - key: NEXT_PUBLIC_WS_URL
        fromService:
          type: web
          name: kanban-ws-server
          property: url

  # Redis
  - type: redis
    name: kanban-redis
    plan: free
    ipAllowList: [] # Only allow internal connections